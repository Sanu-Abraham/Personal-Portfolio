<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Lost</title>

  <link rel="icon" type="image/x-icon" href="/assets/img/icon/favicon.ico" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/pages.css" />
  <link rel="stylesheet" href="/assets/css/animations.css" />

  <style>
    .notfound {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      position: relative;
    }

    .notfound-content {
      max-width: 700px;
      display: grid;
      gap: 1.5rem;
    }

    .notfound-code {
      font-size: clamp(5rem, 18vw, 12rem);
      font-weight: 800;
      letter-spacing: -0.08em;
      line-height: 0.8;
      opacity: 0.15;
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      user-select: none;
    }

    .notfound-title {
      font-size: clamp(2rem, 5vw, 3.5rem);
      letter-spacing: -0.05em;
    }

    .notfound-text {
      color: var(--text-muted);
      font-size: 1.05rem;
    }

    .notfound-actions {
      display: flex;
      gap: 0.8rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .notfound a {
      text-decoration: none;
    }

    .notfound-glitch span {
      display: inline-block;
      position: relative;
      animation: glitchShift 2.5s infinite ease-in-out;
    }

    .notfound-glitch span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .notfound-glitch span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes glitchShift {
      0%, 100% {
        transform: translate(0, 0);
      }
      20% {
        transform: translate(-1px, 1px);
      }
      40% {
        transform: translate(1px, -1px);
      }
      60% {
        transform: translate(-0.5px, 0.5px);
      }
      80% {
        transform: translate(0.5px, -0.5px);
      }
    }
  </style>
</head>

<body>
  <div class="noise"></div>

  <main class="notfound">
    <div class="notfound-code">404</div>

    <div class="notfound-content reveal">
      <p class="eyebrow">Error</p>

      <h1 class="notfound-title notfound-glitch">
        <span>Page</span> <span>Not</span> <span>Found</span>
      </h1>

      <p class="notfound-text">
        You weren’t supposed to end up here. Or maybe you were.  
        Either way, this page doesn’t exist.
      </p>

      <div class="notfound-actions">
        <a href="/" class="btn btn-primary">Go Home</a>
        <a href="/projects/" class="btn btn-secondary">View Projects</a>
      </div>
    </div>
  </main>

  <script src="/assets/js/animations.js"></script>
</body>
</html>
